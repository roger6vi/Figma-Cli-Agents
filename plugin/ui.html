<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, sans-serif;
      font-size: 11px;
      background: #2c2c2c;
      color: #fff;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 10px 12px;
      gap: 4px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }
    .dot.connecting { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.connected { background: #22c55e; }
    .dot.error { background: #ef4444; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .title { font-weight: 600; font-size: 12px; }
    #status { color: #aaa; }
    .hint { font-size: 9px; color: #666; margin-top: 2px; }
    .panel { display: flex; flex-direction: column; gap: 8px; }
    .pairing-copy { color: #d4d4d8; line-height: 1.35; }
    #pairingForm { display: flex; gap: 6px; }
    #tokenInput {
      flex: 1;
      min-width: 0;
      border: 1px solid #52525b;
      border-radius: 6px;
      background: #18181b;
      color: #fff;
      padding: 6px 8px;
      font-size: 11px;
    }
    button {
      border: 0;
      border-radius: 6px;
      background: #3b82f6;
      color: white;
      font-weight: 600;
      padding: 6px 10px;
      cursor: pointer;
    }
    .error { color: #fca5a5; line-height: 1.35; }
  </style>
</head>
<body>
  <div class="title">Figma DS CLI</div>

  <section id="pairingPanel" class="panel">
    <div class="pairing-copy">Paste the Safe Mode pairing token from your terminal.</div>
    <form id="pairingForm">
      <input id="tokenInput" type="password" autocomplete="off" spellcheck="false" placeholder="64-char token" />
      <button type="submit">Pair</button>
    </form>
    <div id="pairingError" class="error" hidden></div>
  </section>

  <section id="statusPanel" class="panel" hidden>
    <div class="row">
      <div id="dot" class="dot connecting"></div>
      <span id="status">Waiting for token...</span>
    </div>
    <div class="hint">Keep this window open</div>
  </section>

  <script>
    const PORTS = [3456, 3457, 3458, 3459, 3460];
    let ws = null;
    let reconnectTimer = null;
    let keepaliveTimer = null;
    let lastPong = Date.now();
    let daemonToken = null;

    const pairingPanel = document.getElementById('pairingPanel');
    const pairingForm = document.getElementById('pairingForm');
    const tokenInput = document.getElementById('tokenInput');
    const pairingError = document.getElementById('pairingError');
    const statusPanel = document.getElementById('statusPanel');
    const statusEl = document.getElementById('status');
    const dotEl = document.getElementById('dot');

    function setStatus(text, state) {
      statusEl.textContent = text;
      dotEl.className = 'dot ' + state;
    }

    function showPairing(message) {
      stopKeepalive();
      if (ws) {
        try { ws.close(); } catch {}
        ws = null;
      }
      daemonToken = null;
      statusPanel.hidden = true;
      pairingPanel.hidden = false;
      pairingError.hidden = !message;
      pairingError.textContent = message || '';
      tokenInput.value = '';
      tokenInput.focus();
    }

    function showStatus(text, state) {
      pairingPanel.hidden = true;
      statusPanel.hidden = false;
      setStatus(text || 'Scanning...', state || 'connecting');
    }

    pairingForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const token = tokenInput.value.trim();
      if (!token) {
        showPairing('Token is required.');
        return;
      }
      parent.postMessage({ pluginMessage: { type: 'pair-token', token } }, '*');
    });

    function connectParallel() {
      if (!daemonToken) {
        showPairing();
        return;
      }
      if (ws && ws.readyState === WebSocket.OPEN) return;

      showStatus('Scanning...', 'connecting');
      let connected = false;
      const attempts = [];

      PORTS.forEach(port => {
        const url = `ws://127.0.0.1:${port}/plugin`;
        try {
          const socket = new WebSocket(url, ['figcli-v1', daemonToken]);
          attempts.push(socket);

          socket.onopen = () => {
            if (connected) {
              socket.close();
              return;
            }
            connected = true;
            ws = socket;

            attempts.forEach(s => {
              if (s !== socket) {
                s.onclose = null;
                s.onerror = null;
                try { s.close(); } catch {}
              }
            });

            ws.onmessage = handleMessage;
            ws.onclose = handleClose;
            ws.onerror = handleClose;

            showStatus('Connected', 'connected');
            parent.postMessage({ pluginMessage: { type: 'connected' } }, '*');
            ws.send(JSON.stringify({ type: 'hello', mode: 'plugin', version: '1.3.0' }));
            startKeepalive();
          };

          socket.onclose = () => {};
          socket.onerror = () => {};
        } catch (e) {}
      });

      setTimeout(() => {
        if (!connected) {
          attempts.forEach(s => {
            s.onclose = null;
            try { s.close(); } catch {}
          });

          // Browser WebSocket does not expose HTTP 401 from a failed upgrade.
          // If we had a token and no daemon accepts it, treat it as a stale token
          // and ask the user to pair again.
          parent.postMessage({ pluginMessage: { type: 'auth-failed' } }, '*');
          showPairing('Token rejected or daemon not found. Paste the current Safe Mode token.');
        }
      }, 1500);
    }

    function handleMessage(event) {
      try {
        const msg = JSON.parse(event.data);
        if (msg.action === 'eval') {
          parent.postMessage({ pluginMessage: { type: 'eval', id: msg.id, code: msg.code } }, '*');
        }
        if (msg.action === 'eval-batch') {
          parent.postMessage({ pluginMessage: { type: 'eval-batch', id: msg.id, codes: msg.codes } }, '*');
        }
        if (msg.action === 'ping') {
          ws.send(JSON.stringify({ type: 'pong', id: msg.id }));
        }
        if (msg.type === 'pong') {
          lastPong = Date.now();
        }
      } catch (e) {
        console.error('Message parse error:', e);
      }
    }

    function handleClose(event) {
      if (event && event.code === 1008) {
        parent.postMessage({ pluginMessage: { type: 'auth-failed' } }, '*');
        showPairing(event.reason || 'Authentication failed. Paste the current Safe Mode token.');
        return;
      }

      if (ws && ws.readyState !== WebSocket.OPEN) {
        ws = null;
        showStatus('Reconnecting...', 'connecting');
        stopKeepalive();
        parent.postMessage({ pluginMessage: { type: 'disconnected' } }, '*');
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connectParallel, 200);
      }
    }

    function startKeepalive() {
      stopKeepalive();
      lastPong = Date.now();
      keepaliveTimer = setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          if (Date.now() - lastPong > 8000) {
            ws.close();
            return;
          }
          ws.send(JSON.stringify({ type: 'ping' }));
        }
      }, 3000);
    }

    function stopKeepalive() {
      if (keepaliveTimer) {
        clearInterval(keepaliveTimer);
        keepaliveTimer = null;
      }
    }

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'stored-token' || msg.type === 'pairing-saved') {
        daemonToken = msg.token;
        pairingError.hidden = true;
        showStatus('Scanning...', 'connecting');
        connectParallel();
        return;
      }

      if (msg.type === 'pairing-required') {
        showPairing();
        return;
      }

      if (msg.type === 'result') {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'result', id: msg.id, result: msg.result, error: msg.error }));
        }
      }

      if (msg.type === 'batch-result') {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'batch-result', id: msg.id, results: msg.results }));
        }
      }
    };

    parent.postMessage({ pluginMessage: { type: 'request-stored-token' } }, '*');
  </script>
</body>
</html>
